experiment:
  name: trafficcamnet_eval_bdd100k
  seed: 42

runtime:
  remote_host: qudata
  remote_python: python3
  remote_uv: uv
  remote_bundle_root: /dev/shm/trafficcamnet_eval
  remote_python_version: "3.10"
  run_id: null
  cleanup_remote_bundle: true
  remote_with_packages:
    - numpy
    - onnxruntime-gpu
    - opencv-python-headless

model:
  # ONNX model for RTX 5090 — convert from NGC etlt:
  #   ngc registry model download-version "nvidia/tao/trafficcamnet:deployable_v1.0"
  #   tao model detectnet_v2 export -m resnet18_trafficcamnet_pruned.etlt \
  #     -k nvidia_tlt --export_format onnx -o resnet18_trafficcamnet.onnx
  local_path: models/baseline/resnet18_trafficcamnet.onnx
  input_w: 960
  input_h: 544
  num_classes: 4
  class_names: [car, truck, bicycle, person]
  # Preprocessing matches DeepStream PGIE config:
  #   net-scale-factor=1/255, offsets=103.939;116.779;123.68 (BGR), color-format=RGB
  net_scale_factor: 0.0039215697906911373
  mean_r: 123.68
  mean_g: 116.779
  mean_b: 103.939
  confidence_threshold: 0.3
  nms_iou_threshold: 0.45
  output_cov_name: "output_cov/Sigmoid"
  output_bbox_name: "output_bbox/BiasAdd"

data:
  # Local paths (for annotation staging and local analysis)
  local_ann_json: /home/mk/Загрузки/DATASETS/bdd100k/bdd100k_labels_release/bdd100k/labels/bdd100k_labels_images_val.json
  local_images_dir: /home/mk/Загрузки/DATASETS/bdd100k/bdd100k/bdd100k/images/100k/val
  # Remote path — BDD100K must be downloaded on remote host:
  #   kaggle datasets download -d solesensei/solesensei_bdd100k && unzip
  remote_images_dir: ~/datasets/bdd100k/images/100k/val
  kaggle_dataset: solesensei/solesensei_bdd100k
  max_images: null  # null = all ~10000 val images

  # BDD100K → TrafficCamNet class mapping
  category_map:
    car: car
    truck: truck
    bus: truck
    bike: bicycle
    motor: bicycle
    person: person
    rider: person

evaluation:
  batch_size: 16
  iou_threshold: 0.5
  target_precision: 0.90
  target_recall: 0.85
  target_f1: 0.87
  error_examples_n: 12
  save_predictions: true

artifacts:
  local_output_root: results/trafficcamnet_eval
  local_figure_root: notebooks/tcn_eval/images
  remote_output_dirname: outputs
  raw_remote_dirname: raw_remote
